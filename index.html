<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زانستی</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="he"> زانا و فیزیازانێن مێژووی</h1>

<!-- SEARCH -->
<div class="search-container">
  <input type="text" id="searchInput" placeholder="🔍ناڤێ زانای ..." onkeyup="searchScientist(); showSuggestions()">
  <div id="suggestions"></div>
</div>

<button class="toggle-btn" onclick="toggleDark()">🌙</button>

<div class="img-container">

  <div class="box">
    <a href="en.html">
      <div class="img-wrapper">
        <img src="images/e.jpg">
        <div class="overlay">تیۆریا ڕێژەیی</div>
      </div>
    </a>
    <p class="pi"> ئەلبێرت ئەنیشتاین </p>
  </div>

  <div class="box">
    <a href="ne.html">
      <div class="img-wrapper">
        <img src="images/new.jpg">
        <div class="overlay">یاسایێن لڤینێ </div>
      </div>
    </a>
    <p class="pi">ئیسحاق نیوتن </p>
  </div>

  <div class="box">
    <a href="zhe.html">
      <div class="img-wrapper">
        <img src="images/zhee.png">
        <div class="overlay">زانیاری داهاتوو</div>
      </div>
    </a>
    <p class="pi"> ژێهات </p>
  </div>

  <div class="box">
    <a href="je.html">
      <div class="img-wrapper">
        <img src="images/je.jpg">
        <div class="overlay">بەزودی</div>
      </div>
    </a>
    <p class="pi"> ژیر </p>
  </div>

</div>

<script>
function toggleDark() {
  document.body.classList.toggle("dark");
}

/* FILTER CARDS */
function searchScientist() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.querySelectorAll(".box");

  cards.forEach(card => {
    let text = card.innerText.toLowerCase();
    card.style.display = text.includes(input) ? "block" : "none";
  });
}

/* SUGGESTIONS */
const data = [
  {name: "ئەنیشتاین", link: "en.html"},
  {name: "نیوتن", link: "ne.html"},
  {name: "ژێهات", link: "zhe.html"},
  {name: "ژیر", link: "je.html"}
];

function showSuggestions() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let box = document.getElementById("suggestions");

  box.innerHTML = "";

  if (input === "") return;

  data.forEach(item => {
    if (item.name.toLowerCase().includes(input)) {
      let div = document.createElement("div");
      div.classList.add("suggest-item");
      div.innerText = item.name;

      div.onclick = () => {
        window.location.href = item.link;
      };

      box.appendChild(div);
    }
  });
}
</script>

</body>
</html>
